<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול נוכחות</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0c0c10;--surface:#15151c;--surface2:#1e1e28;--border:#28283a;--text:#eeedf8;--muted:#6e6d85;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--blue:#74b9ff;--yellow:#fdcb6e;--red:#ff7675;--pink:#fd79a8;}
body{font-family:"Rubik",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem;}
.app{max-width:900px;margin:0 auto;}
.header{text-align:center;margin-bottom:2rem;}
.header h1{font-size:1.6rem;font-weight:600;}
.header p{font-size:13px;color:var(--muted);margin-top:6px;}
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:1.5rem;}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;border-radius:9px;color:var(--muted);transition:all .2s;}
.tab.active{background:var(--accent);color:#fff;}
.pane{display:none;}
.pane.active{display:block;}
.setup-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:1.5rem;}
.setup-box label{font-size:12px;color:var(--muted);display:block;margin-bottom:8px;}
.setup-row{display:flex;gap:10px;}
.setup-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;}
.setup-row input:focus{border-color:var(--accent);}
.setup-row input::placeholder{color:var(--muted);}
.btn-save{background:var(--accent);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-family:"Rubik",sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.api-status{font-size:12px;margin-top:8px;color:var(--muted);}
.api-status.ok{color:var(--green);}
.input-area{margin-bottom:1rem;}
.input-area label{font-size:12px;color:var(--muted);display:block;margin-bottom:8px;}
.input-row{display:flex;gap:10px;}
.input-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:14px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;}
.input-row input:focus{border-color:var(--accent);}
.input-row input::placeholder{color:var(--muted);}
.btn-send{background:var(--accent);border:none;border-radius:12px;padding:13px 22px;color:#fff;font-family:"Rubik",sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;}
.btn-send:disabled{opacity:.4;cursor:not-allowed;}
.status{padding:11px 16px;font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:1.5rem;min-height:44px;display:flex;align-items:center;gap:8px;}
.status.ok{color:var(--green);border-color:#00b89433;}
.status.err{color:var(--red);border-color:#ff767533;}
.status.loading{color:var(--accent2);border-color:#6c5ce733;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid var(--accent2);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:1.5rem;}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);}
.card-head span{font-size:14px;font-weight:500;}
.head-btns{display:flex;gap:8px;}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-family:"Rubik",sans-serif;font-size:12px;cursor:pointer;}
.btn-sm:hover{color:var(--text);}
.scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:9px 10px;background:var(--surface2);color:var(--muted);font-weight:400;white-space:nowrap;text-align:center;border-bottom:1px solid var(--border);}
th.nc{text-align:right;min-width:120px;}
td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;}
td.nm{text-align:right;color:var(--text);font-weight:500;white-space:nowrap;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px;}
td.nm:hover{color:var(--accent2);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#ffffff06;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.bh{background:#74b9ff18;color:var(--blue);}
.bc{background:#00b89418;color:var(--green);}
.bg{background:#fdcb6e18;color:var(--yellow);}
.bn{background:#ff767518;color:var(--red);}
.ba{background:#fd79a818;color:var(--pink);}
.bm{background:#a29bfe18;color:var(--accent2);cursor:pointer;}
.bm:hover{background:#a29bfe33;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);display:inline-block;cursor:pointer;}
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid var(--border);}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000088;z-index:100;align-items:center;justify-content:center;padding:20px;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:400px;direction:rtl;max-height:85vh;overflow-y:auto;}
.modal h3{font-size:14px;font-weight:500;margin-bottom:12px;color:var(--muted);}
.modal textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;font-size:13px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;resize:none;margin-bottom:12px;}
.modal textarea:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;}
.mbtn{border:none;border-radius:8px;padding:8px 16px;font-family:"Rubik",sans-serif;font-size:13px;cursor:pointer;}
.mbtn-s{background:var(--accent);color:#fff;}
.mbtn-c{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.mbtn-d{background:#ff767518;color:var(--red);border:1px solid #ff767533;}
.emp-list{padding:0 18px 12px;}
.emp-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.emp-row:last-child{border-bottom:none;}
.emp-name{font-size:13px;font-weight:500;}
.btn-del{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;color:var(--red);font-size:12px;cursor:pointer;}
.btn-del:hover{background:#ff767518;}
.add-emp-row{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--border);}
.add-emp-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;}
.add-emp-row input:focus{border-color:var(--accent);}
.btn-add{background:var(--accent);border:none;border-radius:10px;padding:9px 18px;color:#fff;font-family:"Rubik",sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
/* Profile modal */
.profile-modal{max-width:460px;}
.profile-sec{margin-bottom:16px;}
.profile-sec-title{font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.profile-field{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.profile-field label{font-size:12px;color:var(--muted);width:120px;flex-shrink:0;}
.profile-field input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;}
.profile-field input:focus{border-color:var(--accent);}
.profile-field .del-field{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 6px;}
.profile-field .del-field:hover{color:var(--red);}
/* Field manager */
.fm-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.fm-row:last-child{border-bottom:none;}
.fm-row .fm-label{flex:1;font-weight:500;}
.fm-row .fm-meta{color:var(--muted);font-size:11px;}
.fm-add{display:flex;flex-direction:column;gap:8px;padding-top:12px;margin-top:8px;border-top:1px solid var(--border);}
.fm-add input,.fm-add select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;}
.fm-add input:focus,.fm-add select:focus{border-color:var(--accent);}
.fm-add-row{display:flex;gap:8px;}
.fm-add-row select{flex:1;}
.fm-add-row input{flex:2;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>ניהול נוכחות</h1>
    <p>כתוב הודעה — המערכת תעדכן את הטבלה אוטומטית</p>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-main" onclick="switchTab('main')">נוכחות</div>
    <div class="tab" id="tab-settings" onclick="switchTab('settings')">הגדרות</div>
  </div>
  <div class="pane active" id="pane-main">
    <div class="setup-box">
      <label>מפתח Anthropic API</label>
      <div class="setup-row">
        <input type="password" id="apiKey" placeholder="sk-ant-..." />
        <button class="btn-save" onclick="saveKey()">שמור</button>
      </div>
      <div class="api-status" id="apiStatus">לא הוזן מפתח &mdash; <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent2)">קבל מפתח חינמי כאן</a></div>
    </div>
    <div class="input-area">
      <label>הודעה חדשה</label>
      <div class="input-row">
        <input type="text" id="msg" placeholder="לדוגמה: אורי חותם חופש ביום שלישי" onkeydown="if(event.key==='Enter')sendMsg()" />
        <button class="btn-send" id="sendBtn" onclick="sendMsg()">שלח</button>
      </div>
    </div>
    <div class="status" id="status">מוכן</div>
    <div class="card">
      <div class="card-head">
        <span>שבועיים קדימה</span>
        <div class="head-btns">
          <button class="btn-sm" onclick="copyReport()">דוח 1</button>
          <button class="btn-sm" onclick="copyExcel()">העתק ל-Excel</button>
        </div>
      </div>
      <div class="scroll"><table id="tbl"></table></div>
      <div class="legend">
        <span class="badge bh">הפנייה</span>
        <span class="badge bc">חופש</span>
        <span class="badge bg">גימל</span>
        <span class="badge bn">לא מגיע</span>
        <span class="badge ba">אפטר</span>
        <span class="badge bm">מיוחד ✎</span>
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);text-align:center;">לחץ על שם החייל לצפייה ועריכת פרטים אישיים</p>
  </div>
  <div class="pane" id="pane-settings">
    <div class="card">
      <div class="card-head"><span>ניהול עובדים</span></div>
      <div class="emp-list" id="empList"></div>
      <div class="add-emp-row">
        <input type="text" id="newEmpInput" placeholder="שם העובד החדש" onkeydown="if(event.key==='Enter')addEmp()" />
        <button class="btn-add" onclick="addEmp()">הוסף</button>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span>שדות מידע אישי</span></div>
      <div style="padding:0 18px 14px;">
        <div id="fieldList"></div>
        <div class="fm-add">
          <div class="fm-add-row">
            <select id="newFieldType">
              <option value="text">טקסט</option>
              <option value="number">מספר</option>
              <option value="date">תאריך</option>
            </select>
            <input type="text" id="newFieldLabel" placeholder="שם השדה (למשל: מספר טלפון)" />
          </div>
          <div class="fm-add-row">
            <select id="newFieldCat" style="flex:1">
              <option value="personal">אישי</option>
              <option value="military">צבאי</option>
            </select>
            <button class="btn-add" onclick="addField()" style="flex:1">הוסף שדה</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Special event modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">פרטי אירוע מיוחד</h3>
    <textarea id="modalText" rows="3" placeholder="תאר את האירוע..."></textarea>
    <div class="modal-btns">
      <button class="mbtn mbtn-s" onclick="saveModal()">שמור</button>
      <button class="mbtn mbtn-d" onclick="deleteSpecial()">מחק</button>
      <button class="mbtn mbtn-c" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<!-- Profile modal -->
<div class="overlay" id="profileOverlay" onclick="if(event.target===this)closeProfile()">
  <div class="modal profile-modal">
    <h3 id="profileTitle" style="font-size:16px;color:var(--text);">שם החייל</h3>
    <div id="profileBody"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-c" onclick="closeProfile()" style="width:100%;">סגור</button>
    </div>
  </div>
</div>

<script>
var SHEETS_URL = 'https://script.google.com/macros/s/AKfycbyTRXLKiKHnf2PuWTrNU-5aSE8WwVyXDLUyTRuLVgH_F1mMeFzpZ9ZYtCDCMLR15gtDvw/exec';
var PROXY_URL = 'https://hr-proxy.shalevbuaron.workers.dev';
var DEFAULT_EMP = ["איתן ליבשין", "איתן רוזנטל", "אורי דויטש", "בר ורוטנקר", "גיא אליאס", "מור ריבק", "רוני קוטליארנקו", "שחר שטייר", "אדר ביטון", "איתי בנס"];
var DEFAULT_FIELDS = [{"key": "dapar", "label": "דפ\"ר", "type": "text", "cat": "military", "builtin": true}, {"key": "enlist", "label": "תאריך גיוס", "type": "date", "cat": "military", "builtin": true}, {"key": "hatash", "label": "הת\"ש", "type": "text", "cat": "military", "builtin": true}, {"key": "discharge", "label": "תאריך שחרור", "type": "date", "cat": "military", "builtin": true}, {"key": "cmd_days", "label": "ימי מפקד", "type": "number", "cat": "military", "builtin": true}, {"key": "vacation", "label": "ימי חופש שנותרו", "type": "number", "cat": "military", "builtin": true}, {"key": "birthday", "label": "יום הולדת", "type": "date", "cat": "personal", "builtin": true}, {"key": "allergies", "label": "אלרגיות", "type": "text", "cat": "personal", "builtin": true}];
var DN = {0:'ראשון',1:'שני',2:'שלישי',3:'רביעי',4:'חמישי'};
var WD = [];
var tableData = {};
var specialData = {};
var profileData = {};
var fieldDefs = [];
var EMP = [];
var chatHistory = [];
var modalEmp = null, modalDate = null;
var profileEmp = null;

function getWD() {
  var days = [], d = new Date();
  d.setDate(d.getDate() + 1);
  while (days.length < 10) {
    var w = d.getDay();
    if (w >= 0 && w <= 4) days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function fmt(d) {
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

function sortEMP() {
  EMP.sort(function(a,b) { return a.localeCompare(b, 'he'); });
}

function setSt(msg, cls) {
  var el = document.getElementById('status');
  el.className = 'status' + (cls ? ' ' + cls : '');
  el.innerHTML = cls === 'loading' ? '<div class="spinner"></div><span>' + msg + '</span>' : msg;
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.pane').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('pane-'+t).classList.add('active');
  if (t === 'settings') renderSettings();
}

function saveKey() {
  var k = document.getElementById('apiKey').value.trim();
  if (!k) { setSt('אנא הכנס מפתח API','err'); return; }
  localStorage.setItem('hr_apikey', k);
  document.getElementById('apiStatus').textContent = 'מפתח שמור';
  document.getElementById('apiStatus').className = 'api-status ok';
  setSt('מפתח נשמר','ok');
}

function processYesterdayVacation() {
  var yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  var yw = yesterday.getDay();
  if (yw === 5 || yw === 6) return;
  var yKey = fmt(yesterday);
  var lastProcessed = localStorage.getItem('hr_last_processed') || '';
  if (lastProcessed === yKey) return;
  var changed = false;
  EMP.forEach(function(emp) {
    if (tableData[emp] && tableData[emp][yKey] === 'חופש') {
      if (!profileData[emp]) profileData[emp] = {};
      var cur = parseInt(profileData[emp].vacation) || 0;
      profileData[emp].vacation = String(cur - 1);
      changed = true;
    }
  });
  if (changed) {
    localStorage.setItem('hr_last_processed', yKey);
    saveToSheets();
  }
}

function renderSettings() {
  var sorted = EMP.slice().sort(function(a,b){ return a.localeCompare(b,'he'); });
  var h = '';
  sorted.forEach(function(e) {
    var empEnc = encodeURIComponent(e);
    h += '<div class="emp-row">';
    h += '<span class="emp-name">' + e + '</span>';
    h += '<button class="btn-del" onclick="removeEmp(\'' + empEnc + '\')">הסר</button>';
    h += '</div>';
  });
  document.getElementById('empList').innerHTML = h;
  renderFieldManager();
}

function renderFieldManager() {
  var h = '';
  fieldDefs.forEach(function(f, i) {
    var catLabel = f.cat === 'personal' ? 'אישי' : 'צבאי';
    var typeLabel = f.type === 'number' ? 'מספר' : (f.type === 'date' ? 'תאריך' : 'טקסט');
    h += '<div class="fm-row">';
    h += '<span class="fm-label">' + f.label + '</span>';
    h += '<span class="fm-meta">' + catLabel + ' · ' + typeLabel + '</span>';
    if (!f.builtin) {
      h += '<button class="btn-del" onclick="removeField(' + i + ')">הסר</button>';
    }
    h += '</div>';
  });
  document.getElementById('fieldList').innerHTML = h;
}

function addField() {
  var label = document.getElementById('newFieldLabel').value.trim();
  var type = document.getElementById('newFieldType').value;
  var cat = document.getElementById('newFieldCat').value;
  if (!label) { alert('אנא הכנס שם שדה'); return; }
  var key = 'custom_' + Date.now();
  fieldDefs.push({key:key, label:label, type:type, cat:cat, builtin:false});
  saveFieldDefs();
  document.getElementById('newFieldLabel').value = '';
  renderFieldManager();
}

function removeField(idx) {
  if (!confirm('להסיר את השדה "' + fieldDefs[idx].label + '" מכל העובדים?')) return;
  var key = fieldDefs[idx].key;
  fieldDefs.splice(idx, 1);
  Object.keys(profileData).forEach(function(emp) {
    if (profileData[emp] && profileData[emp][key] !== undefined) delete profileData[emp][key];
  });
  saveFieldDefs();
  saveToSheets();
  renderFieldManager();
}

function saveFieldDefs() {
  try { localStorage.setItem('hr_fields', JSON.stringify(fieldDefs)); } catch(ex) {}
  saveToSheets();
}

function addEmp() {
  var name = document.getElementById('newEmpInput').value.trim();
  if (!name) return;
  if (EMP.indexOf(name) !== -1) { alert('עובד זה כבר קיים'); return; }
  EMP.push(name);
  sortEMP();
  if (!tableData[name]) tableData[name] = {};
  if (!profileData[name]) profileData[name] = {};
  saveEmpList();
  saveToSheets();
  document.getElementById('newEmpInput').value = '';
  renderSettings();
  render();
}

function removeEmp(empEnc) {
  var name = decodeURIComponent(empEnc);
  if (!confirm('להסיר את ' + name + '?')) return;
  var idx = EMP.indexOf(name);
  if (idx === -1) return;
  EMP.splice(idx, 1);
  delete tableData[name];
  delete profileData[name];
  saveEmpList();
  saveToSheets();
  renderSettings();
  render();
}

function saveEmpList() {
  try { localStorage.setItem('hr_emplist', JSON.stringify(EMP)); } catch(ex) {}
}

function getBadge(v, e, dateKey) {
  var empEnc = encodeURIComponent(e);
  if (v === 'הפנייה' || v === 'רופא') return '<span class="badge bh">הפנייה</span>';
  if (v === 'חופש') return '<span class="badge bc">חופש</span>';
  if (v === 'גימל') return '<span class="badge bg">גימל</span>';
  if (v === 'לא מגיע') return '<span class="badge bn">לא מגיע</span>';
  if (v === 'אפטר') return '<span class="badge ba">אפטר</span>';
  if (v === 'מיוחד') {
    var note = (specialData[e] && specialData[e][dateKey]) || '';
    var label = note ? (note.length > 8 ? note.slice(0,8) + '..' : note) : 'מיוחד';
    return '<span class="badge bm" data-emp="' + empEnc + '" data-date="' + dateKey + '" onclick="handleBadgeClick(this)">' + label + ' \u270e</span>';
  }
  if (v) return '<span class="badge bn">' + v + '</span>';
  return '<span class="dot" data-emp="' + empEnc + '" data-date="' + dateKey + '" onclick="handleBadgeClick(this)"></span>';
}

function handleBadgeClick(el) {
  openModal(decodeURIComponent(el.getAttribute('data-emp')), el.getAttribute('data-date'));
}

function render() {
  var sorted = EMP.slice().sort(function(a,b){ return a.localeCompare(b,'he'); });
  var h = '<thead><tr><th class="nc">שם החייל</th>';
  for (var i = 0; i < WD.length; i++) {
    h += '<th>' + DN[WD[i].getDay()] + '<br><span style="font-size:10px;opacity:.5">' + fmt(WD[i]) + '</span></th>';
  }
  h += '</tr></thead><tbody>';
  for (var ei = 0; ei < sorted.length; ei++) {
    var e = sorted[ei];
    var empEnc = encodeURIComponent(e);
    h += '<tr><td class="nm" onclick="openProfile(\'' + empEnc + '\')">' + e + '</td>';
    for (var di = 0; di < WD.length; di++) {
      var dateKey = fmt(WD[di]);
      var v = (tableData[e] && tableData[e][dateKey]) || '';
      h += '<td>' + getBadge(v, e, dateKey) + '</td>';
    }
    h += '</tr>';
  }
  h += '</tbody>';
  document.getElementById('tbl').innerHTML = h;
}

// ===== Special event modal =====
function openModal(emp, date) {
  modalEmp = emp; modalDate = date;
  document.getElementById('modalTitle').textContent = emp + ' \u2014 ' + date;
  document.getElementById('modalText').value = (specialData[emp] && specialData[emp][date]) || '';
  document.getElementById('overlay').classList.add('open');
  setTimeout(function() { document.getElementById('modalText').focus(); }, 100);
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  modalEmp = null; modalDate = null;
}
function saveModal() {
  if (!modalEmp || !modalDate) return;
  var text = document.getElementById('modalText').value.trim();
  if (!specialData[modalEmp]) specialData[modalEmp] = {};
  specialData[modalEmp][modalDate] = text;
  if (!tableData[modalEmp]) tableData[modalEmp] = {};
  tableData[modalEmp][modalDate] = 'מיוחד';
  saveToSheets(); render(); closeModal();
}
function deleteSpecial() {
  if (!modalEmp || !modalDate) return;
  if (specialData[modalEmp]) delete specialData[modalEmp][modalDate];
  if (tableData[modalEmp]) tableData[modalEmp][modalDate] = '';
  saveToSheets(); render(); closeModal();
}

// ===== Profile modal =====
function openProfile(empEnc) {
  profileEmp = decodeURIComponent(empEnc);
  if (!profileData[profileEmp]) profileData[profileEmp] = {};
  renderProfile();
  document.getElementById('profileOverlay').classList.add('open');
}

function closeProfile() {
  document.getElementById('profileOverlay').classList.remove('open');
  profileEmp = null;
}

function renderProfile() {
  document.getElementById('profileTitle').textContent = profileEmp;
  var mil = fieldDefs.filter(function(f){ return f.cat === 'military'; });
  var per = fieldDefs.filter(function(f){ return f.cat === 'personal'; });
  var data = profileData[profileEmp] || {};

  function renderSection(title, fields) {
    var h = '<div class="profile-sec"><div class="profile-sec-title">' + title + '</div>';
    fields.forEach(function(f) {
      var val = data[f.key] || '';
      var inputType = f.type === 'number' ? 'number' : (f.type === 'date' ? 'date' : 'text');
      h += '<div class="profile-field">';
      h += '<label>' + f.label + '</label>';
      h += '<input type="' + inputType + '" value="' + val + '" onchange="setProfileField(\'' + f.key + '\',this.value)" />';
      h += '</div>';
    });
    h += '</div>';
    return h;
  }

  var html = renderSection('צבאי', mil) + renderSection('אישי', per);
  document.getElementById('profileBody').innerHTML = html;
}

function setProfileField(key, val) {
  if (!profileEmp) return;
  if (!profileData[profileEmp]) profileData[profileEmp] = {};
  profileData[profileEmp][key] = val;
  saveToSheets();
}

// ===== Sheets sync =====
function saveToSheets() {
  var sorted = EMP.slice().sort(function(a,b){ return a.localeCompare(b,'he'); });
  var headers = ['שם'].concat(WD.map(function(d) { return fmt(d); }));
  var rows = [headers];
  sorted.forEach(function(e) {
    var row = [e];
    WD.forEach(function(d) { row.push((tableData[e] && tableData[e][fmt(d)]) || ''); });
    rows.push(row);
  });
  fetch(SHEETS_URL, {
    method: 'POST',
    body: JSON.stringify({data: rows, special: specialData, profile: profileData, fields: fieldDefs})
  }).catch(function(){});
  try { localStorage.setItem('hr_v6', JSON.stringify(tableData)); } catch(ex) {}
}

function load() {
  WD = getWD();
  EMP = DEFAULT_EMP.slice();
  fieldDefs = DEFAULT_FIELDS.slice();
  try {
    var k = localStorage.getItem('hr_apikey');
    if (k) {
      document.getElementById('apiKey').value = k;
      document.getElementById('apiStatus').textContent = 'מפתח שמור';
      document.getElementById('apiStatus').className = 'api-status ok';
    }
  } catch(e) {}
  setSt('טוען נתונים...', 'loading');
  fetch(SHEETS_URL)
    .then(function(r) { return r.json(); })
    .then(function(result) {
      tableData = {};
      var rows = result.data || [];
      var empFromSheet = [];
      var empSeen = {};
      if (rows.length > 1) {
        var headers = rows[0];
        for (var i = 1; i < rows.length; i++) {
          var empName = rows[i][0];
          if (!empName || empName.indexOf('__') === 0) continue;
          if (empSeen[empName]) continue;
          empSeen[empName] = true;
          empFromSheet.push(empName);
          tableData[empName] = {};
          for (var j = 1; j < headers.length; j++) {
            var hdr = headers[j];
            if (!hdr) continue;
            if (typeof hdr === 'string' && /^\d{4}-\d{2}-\d{2}/.test(hdr)) {
              var dd = new Date(hdr);
              hdr = String(dd.getDate()).padStart(2,'0') + '/' + String(dd.getMonth()+1).padStart(2,'0');
            }
            if (rows[i][j]) tableData[empName][hdr] = rows[i][j];
          }
        }
      }
      if (empFromSheet.length > 0) { EMP = empFromSheet; saveEmpList(); }
      if (result.special) specialData = result.special;
      if (result.profile) profileData = result.profile;
      if (result.fields && result.fields.length) fieldDefs = result.fields;
      processYesterdayVacation();
      render();
      setSt('מוכן', '');
    })
    .catch(function() { render(); setSt('מוכן', ''); });
}

function buildSystemPrompt() {
  var dates = WD.map(function(d) { return DN[d.getDay()] + ' ' + fmt(d); }).join(', ');
  var today = fmt(new Date());
  var stateLines = [];
  EMP.forEach(function(e) {
    var entries = [];
    WD.forEach(function(d) {
      var v = (tableData[e] && tableData[e][fmt(d)]) || '';
      if (v) entries.push(DN[d.getDay()] + ' ' + fmt(d) + ':' + v);
    });
    if (entries.length) stateLines.push(e + ': ' + entries.join(', '));
  });
  var state = stateLines.length ? stateLines.join(' | ') : 'אין היעדרויות';
  return [
    'אתה עוזר HR לניהול נוכחות חיילים. ענה תמיד בעברית.',
    'עובדים: ' + EMP.join(', '),
    'ימי עבודה (ראשון-חמישי): ' + dates,
    'היום: ' + today,
    'מצב נוכחי: ' + state,
    '',
    'חוקים:',
    '1. ימי מחלה נספרים כימים קלנדריים רצופים כולל שישי ושבת. שישי/שבת לא מופיעים בטבלה.',
    '   דוגמה: שבוע מראשון 07/06 = 07-13/06, בטבלה: 07,08,09,10,11/06.',
    '2. אם לא צוין יום התחלה, התחל מהיום הבא.',
    '3. סוגי היעדרות: הפנייה, חופש, גימל, לא מגיע, אפטר, מיוחד',
    '4. אפטר = יוצא באותו יום וחוזר למחרת.',
    '5. מיוחד = אירוע מיוחד, פרטים יוזנו ידנית.',
    '6. ביטול כללי = action:remove_all',
    '7. ביטול ספציפי = action:remove עם תאריך',
    '8. הוספה = action:add',
    '',
    'חשוב: ענה אך ורק ב-JSON תקני ללא טקסט נוסף.',
    'כשמבין: {"changes":[{"employee":"שם","date":"DD/MM","reason":"הפנייה|חופש|גימל|לא מגיע|אפטר|מיוחד","action":"add|remove|remove_all"}],"summary":"תיאור","needs_clarification":false}',
    'כשצריך הבהרה: {"changes":[],"summary":"","needs_clarification":true,"question":"שאלה"}'
  ].join('\n');
}

function sendMsg() {
  var msg = document.getElementById('msg').value.trim();
  if (!msg) { setSt('אנא כתוב הודעה','err'); return; }
  var key = localStorage.getItem('hr_apikey') || '';
  if (!key) { setSt('אנא הכנס מפתח API','err'); return; }
  document.getElementById('sendBtn').disabled = true;
  setSt('מנתח הודעה...','loading');
  chatHistory.push({role:'user', content: msg});
  fetch(PROXY_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body: JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:buildSystemPrompt(),messages:chatHistory})
  })
  .then(function(r) {
    if (!r.ok) return r.json().then(function(e){ throw new Error((e&&e.error&&e.error.message)||'שגיאת שרת '+r.status); });
    return r.json();
  })
  .then(function(result) {
    if (!result || !result.content) throw new Error('תשובה ריקה');
    var text = result.content.filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('');
    chatHistory.push({role:'assistant', content: text});
    var parsed;
    try {
      var clean = text.trim().replace(/^```json\n?/,'').replace(/```$/,'').trim();
      parsed = JSON.parse(clean);
    } catch(e1) {
      try { parsed = JSON.parse(text.slice(text.indexOf('{'), text.lastIndexOf('}')+1)); }
      catch(e2) { throw new Error('תשובה לא תקינה'); }
    }
    if (parsed.needs_clarification) {
      setSt('? ' + parsed.question, '');
      document.getElementById('msg').value = '';
    } else {
      var changes = parsed.changes || [];
      if (changes.length > 0) {
        changes.forEach(function(a) {
          var emp = null;
          for (var i = 0; i < EMP.length; i++) { if (EMP[i] === a.employee) { emp = EMP[i]; break; } }
          if (!emp) { for (var i = 0; i < EMP.length; i++) { if (EMP[i].indexOf(a.employee) !== -1) { emp = EMP[i]; break; } } }
          if (!emp) {
            var parts = a.employee.split(' ');
            var lastName = parts.length > 1 ? parts[parts.length-1] : null;
            if (lastName) { for (var i = 0; i < EMP.length; i++) { if (EMP[i].indexOf(lastName) !== -1) { emp = EMP[i]; break; } } }
          }
          if (emp) {
            if (!tableData[emp]) tableData[emp] = {};
            if (a.action === 'remove_all') { WD.forEach(function(d){ tableData[emp][fmt(d)] = ''; }); }
            else if (a.action === 'remove' && a.date) { tableData[emp][a.date] = ''; }
            else if (a.action === 'add' && a.date) { tableData[emp][a.date] = a.reason || 'לא מגיע'; }
          }
        });
        saveToSheets(); render();
        setSt('\u2713 ' + parsed.summary, 'ok');
        chatHistory = [];
      } else {
        setSt('\u26a0 ' + (parsed.summary || 'לא הבנתי'), 'err');
        chatHistory = [];
      }
      document.getElementById('msg').value = '';
    }
  })
  .catch(function(e) { setSt('שגיאה: ' + e.message, 'err'); chatHistory = []; })
  .finally(function() { document.getElementById('sendBtn').disabled = false; });
}

function copyReport() {
  var tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  while (tomorrow.getDay() === 5 || tomorrow.getDay() === 6) tomorrow.setDate(tomorrow.getDate() + 1);
  var dateKey = fmt(tomorrow);
  var sorted = EMP.slice().sort(function(a,b){ return a.localeCompare(b,'he'); });
  var lines = '*דוח 1 מחלקת אדום יום ' + DN[tomorrow.getDay()] + ' ' + dateKey + '*\n';
  sorted.forEach(function(e) {
    var v = (tableData[e] && tableData[e][dateKey]) || '';
    var loc = 'בסיס';
    if (v==='גימל') loc='גימלים';
    else if (v==='הפנייה') loc='הפנייה';
    else if (v==='חופש') loc='חופשה שנתית';
    else if (v==='לא מגיע') loc='לא מגיע';
    else if (v==='אפטר') loc='אפטר';
    else if (v==='מיוחד') loc=(specialData[e]&&specialData[e][dateKey])||'אירוע מיוחד';
    lines += e + ' - ' + loc + '\n';
  });
  navigator.clipboard.writeText(lines).then(function() {
    var b = document.querySelectorAll('.btn-sm')[0];
    var o = b.textContent; b.textContent = 'הועתק!';
    setTimeout(function(){ b.textContent = o; }, 2000);
  });
}

function copyExcel() {
  var sorted = EMP.slice().sort(function(a,b){ return a.localeCompare(b,'he'); });
  var t = 'שם החייל\t' + WD.map(function(d){ return DN[d.getDay()]+' '+fmt(d); }).join('\t') + '\n';
  sorted.forEach(function(e) {
    t += e + '\t' + WD.map(function(d){ return (tableData[e]&&tableData[e][fmt(d)])||''; }).join('\t') + '\n';
  });
  navigator.clipboard.writeText(t).then(function() {
    var b = document.querySelectorAll('.btn-sm')[1];
    var o = b.textContent; b.textContent = 'הועתק!';
    setTimeout(function(){ b.textContent = o; }, 2000);
  });
}

window.onload = load;
</script>
