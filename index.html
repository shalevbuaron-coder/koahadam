<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ניהול נוכחות</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0c0c10;--surface:#15151c;--surface2:#1e1e28;--border:#28283a;
  --text:#eeedf8;--muted:#6e6d85;--accent:#6c5ce7;--accent2:#a29bfe;
  --green:#00b894;--blue:#74b9ff;--yellow:#fdcb6e;--red:#ff7675;
}
body{font-family:"Rubik",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem;}
.app{max-width:820px;margin:0 auto;}
.header{text-align:center;margin-bottom:2rem;}
.header h1{font-size:1.6rem;font-weight:600;letter-spacing:-0.5px;}
.header p{font-size:13px;color:var(--muted);margin-top:6px;}
.setup-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:1.5rem;}
.setup-box label{font-size:12px;color:var(--muted);display:block;margin-bottom:8px;}
.setup-row{display:flex;gap:10px;}
.setup-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;}
.setup-row input:focus{border-color:var(--accent);}
.setup-row input::placeholder{color:var(--muted);}
.btn-save{background:var(--accent);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-family:"Rubik",sans-serif;font-size:13px;font-weight:500;cursor:pointer;}
.api-status{font-size:12px;margin-top:8px;color:var(--muted);}
.api-status.ok{color:var(--green);}
.input-area{margin-bottom:1rem;}
.input-area label{font-size:12px;color:var(--muted);display:block;margin-bottom:8px;}
.input-row{display:flex;gap:10px;}
.input-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:14px;color:var(--text);font-family:"Rubik",sans-serif;outline:none;}
.input-row input:focus{border-color:var(--accent);}
.input-row input::placeholder{color:var(--muted);}
.btn-send{background:var(--accent);border:none;border-radius:12px;padding:13px 22px;color:#fff;font-family:"Rubik",sans-serif;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;}
.btn-send:disabled{opacity:.4;cursor:not-allowed;}
.status{padding:11px 16px;font-size:13px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:1.5rem;min-height:44px;display:flex;align-items:center;gap:8px;}
.status.ok{color:var(--green);border-color:#00b89433;}
.status.err{color:var(--red);border-color:#ff767533;}
.status.loading{color:var(--accent2);border-color:#6c5ce733;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid var(--accent2);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);}
.card-head span{font-size:14px;font-weight:500;}
.btn-copy{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-family:"Rubik",sans-serif;font-size:12px;cursor:pointer;}
.btn-copy:hover{color:var(--text);}
.scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{padding:9px 10px;background:var(--surface2);color:var(--muted);font-weight:400;white-space:nowrap;text-align:center;border-bottom:1px solid var(--border);}
th.nc{text-align:right;min-width:120px;}
td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;}
td.nm{text-align:right;color:var(--text);font-weight:500;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#ffffff06;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.bh{background:#74b9ff18;color:var(--blue);}
.bc{background:#00b89418;color:var(--green);}
.bg{background:#fdcb6e18;color:var(--yellow);}
.bn{background:#ff767518;color:var(--red);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border);display:inline-block;}
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid var(--border);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>ניהול נוכחות</h1>
    <p>כתוב הודעה — המערכת תעדכן את הטבלה אוטומטית</p>
  </div>

  <div class="setup-box">
    <label>מפתח Anthropic API (נשמר על המחשב שלך בלבד)</label>
    <div class="setup-row">
      <input type="password" id="apiKey" placeholder="sk-ant-..." />
      <button class="btn-save" onclick="saveKey()">שמור</button>
    </div>
    <div class="api-status" id="apiStatus">
      לא הוזן מפתח &mdash; <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent2)">קבל מפתח חינמי כאן</a>
    </div>
  </div>

  <div class="input-area">
    <label>הודעה חדשה</label>
    <div class="input-row">
      <input type="text" id="msg" placeholder="לדוגמה: אורי חותם חופש ביום שלישי" onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="btn-send" id="sendBtn" onclick="sendMsg()">שלח</button>
    </div>
  </div>

  <div class="status" id="status">מוכן</div>

  <div class="card">
    <div class="card-head">
      <span>שבועיים קדימה</span>
      <div style="display:flex;gap:8px;">
        <button class="btn-copy" onclick="copyReport()">דוח 1</button>
        <button class="btn-copy" onclick="copyExcel()">העתק ל-Excel</button>
      </div>
    </div>
    <div class="scroll"><table id="tbl"></table></div>
    <div class="legend">
      <span class="badge bh">הפנייה</span>
      <span class="badge bc">חופש</span>
      <span class="badge bg">גימל</span>
      <span class="badge bn">לא מגיע</span>
    </div>
  </div>
</div>

<script>
var EMP = ["איתן ליבשין","איתן רוזנטל","אורי דויטש","בר ורוטנקר","מור ריבק","רוני קוטליארנקו","שחר שטייר","גיא אליאס","אדר ביטון","איתי בנס"];
var DN = {0:"ראשון",1:"שני",2:"שלישי",3:"רביעי",4:"חמישי"};
var WD = getWD();
var tableData = {};

function getWD() {
  var days = [], d = new Date();
  d.setDate(d.getDate() + 1);
  while (days.length < 10) {
    var w = d.getDay();
    if (w >= 0 && w <= 4) days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function fmt(d) {
  return String(d.getDate()).padStart(2,"0") + "/" + String(d.getMonth()+1).padStart(2,"0");
}

var SHEETS_URL = "https://script.google.com/macros/s/AKfycbyTRXLKiKHnf2PuWTrNU-5aSE8WwVyXDLUyTRuLVgH_F1mMeFzpZ9ZYtCDCMLR15gtDvw/exec";

function load() {
  try {
    var k = localStorage.getItem("hr_apikey");
    if (k) {
      document.getElementById("apiKey").value = k;
      var el = document.getElementById("apiStatus");
      el.textContent = "מפתח שמור";
      el.className = "api-status ok";
    }
  } catch(e) {}
  setSt("טוען נתונים מהענן...", "loading");
  fetch(SHEETS_URL)
    .then(function(r){
      console.log("Sheets response status:", r.status);
      return r.json();
    })
    .then(function(result){
      console.log("Sheets data:", JSON.stringify(result).slice(0,200));
      tableData = {};
      var rows = result.data || [];
      if (rows.length > 1) {
        var headers = rows[0];
        for (var i = 1; i < rows.length; i++) {
          var empName = rows[i][0];
          if (!empName) continue;
          tableData[empName] = {};
          for (var j = 1; j < headers.length; j++) {
            var hdr = headers[j];
            if (!hdr) continue;
            // Convert ISO date format back to DD/MM
            if (typeof hdr === "string" && hdr.match(/^\d{4}-\d{2}-\d{2}/)) {
              var d = new Date(hdr);
              hdr = String(d.getDate()).padStart(2,"0") + "/" + String(d.getMonth()+1).padStart(2,"0");
            } else if (hdr instanceof Date) {
              hdr = String(hdr.getDate()).padStart(2,"0") + "/" + String(hdr.getMonth()+1).padStart(2,"0");
            }
            if (rows[i][j]) {
              tableData[empName][hdr] = rows[i][j];
            }
          }
        }
      }
      render();
      setSt("מוכן", "");
    })
    .catch(function(){
      render();
      setSt("מוכן (לא נטען מהענן)", "");
    });
}

function saveData() {
  // Save to localStorage as backup
  try { localStorage.setItem("hr_v6", JSON.stringify(tableData)); } catch(e) {}
  // Build rows for Sheets: header row + one row per employee
  var headers = ["שם"].concat(WD.map(function(d){ return fmt(d); }));
  var rows = [headers];
  EMP.forEach(function(e) {
    var row = [e];
    WD.forEach(function(d) {
      row.push((tableData[e] && tableData[e][fmt(d)]) || "");
    });
    rows.push(row);
  });
  fetch(SHEETS_URL, {
    method: "POST",
    body: JSON.stringify({data: rows})
  }).catch(function(){});
}

function saveKey() {
  var k = document.getElementById("apiKey").value.trim();
  if (!k) { setSt("אנא הכנס מפתח API","err"); return; }
  localStorage.setItem("hr_apikey", k);
  var el = document.getElementById("apiStatus");
  el.textContent = "מפתח שמור";
  el.className = "api-status ok";
  setSt("מפתח נשמר בהצלחה","ok");
}

function setSt(msg, cls) {
  var el = document.getElementById("status");
  el.className = "status" + (cls ? " " + cls : "");
  if (cls === "loading") {
    el.innerHTML = "<div class='spinner'></div><span>" + msg + "</span>";
  } else {
    el.textContent = msg;
  }
}

function render() {
  var h = "<thead><tr><th class='nc'>שם החייל</th>";
  for (var i = 0; i < WD.length; i++) {
    var d = WD[i];
    h += "<th>" + DN[d.getDay()] + "<br><span style='font-size:10px;opacity:.5'>" + fmt(d) + "</span></th>";
  }
  h += "</tr></thead><tbody>";
  for (var ei = 0; ei < EMP.length; ei++) {
    var e = EMP[ei];
    h += "<tr><td class='nm'>" + e + "</td>";
    for (var di = 0; di < WD.length; di++) {
      var d = WD[di];
      var v = (tableData[e] && tableData[e][fmt(d)]) || "";
      var b = "";
      if (v === "הפנייה" || v === "רופא") b = "<span class='badge bh'>הפנייה</span>";
      else if (v === "חופש") b = "<span class='badge bc'>חופש</span>";
      else if (v === "גימל" || v === "ג'") b = "<span class='badge bg'>גימל</span>";
      else if (v) b = "<span class='badge bn'>" + v + "</span>";
      else b = "<span class='dot'></span>";
      h += "<td>" + b + "</td>";
    }
    h += "</tr>";
  }
  h += "</tbody>";
  document.getElementById("tbl").innerHTML = h;
}

var chatHistory = [];
var systemPrompt = "";

function getSystemPrompt() {
  var dates = WD.map(function(d){ return DN[d.getDay()] + " " + fmt(d); }).join(", ");
  var today = fmt(new Date());

  // Build current state string so model knows what's in the table
  var stateLines = [];
  EMP.forEach(function(e) {
    var entries = [];
    WD.forEach(function(d) {
      var v = (tableData[e] && tableData[e][fmt(d)]) || "";
      if (v) entries.push(DN[d.getDay()] + " " + fmt(d) + ":" + v);
    });
    if (entries.length) stateLines.push(e + ": " + entries.join(", "));
  });
  var currentState = stateLines.length ? stateLines.join("\n") : "אין היעדרויות רשומות";

  return "אתה עוזר HR לניהול נוכחות חיילים. ענה תמיד בעברית.\n" +
    "עובדים: " + EMP.join(", ") + "\n" +
    "ימי עבודה בטבלה (ראשון-חמישי בלבד): " + dates + "\n" +
    "היום: " + today + "\n\n" +
    "מצב נוכחי של הטבלה:\n" + currentState + "\n\n" +
    "חוקים:\n" +
    "1. ימי מחלה נספרים כימים קלנדריים רצופים (כולל שישי ושבת). שישי ושבת לא מופיעים בטבלה אך נספרים.\n" +
    "   דוגמה: שבוע מראשון 07/06 = 07-13/06, בטבלה: 07,08,09,10,11/06 בלבד.\n" +
    "   דוגמה: 4 ימים מחמישי 05/06 = 05-08/06, בטבלה: 05/06 ו-08/06 בלבד.\n" +
    "2. אם לא צוין יום התחלה, התחל מהיום הבא.\n" +
    "3. מחלה/גימל = גימל, רופא/הפנייה = הפנייה\n" +
    "4. כשמבקשים לבטל 'את כל ההיעדרויות' או 'את כל החופשים' וכו' של עובד — השתמש ב-action:remove_all (ללא תאריך).\n" +
    "   זה יסיר את כל הרשומות של אותו עובד מהטבלה.\n" +
    "5. כשמבקשים לבטל היעדרות לתקופה (לדוגמה 'ביטל את החופש לשבוע הקרוב') — \n" +
    "   בדוק במצב הנוכחי של הטבלה מה רשום לאותו עובד בשבוע הקרוב וצור remove לכל יום רלוונטי.\n" +
    "6. ביטול יום ספציפי = action:remove עם תאריך\n" +
    "7. הוספה = action:add\n\n" +
    "חשוב מאוד: ענה אך ורק ב-JSON תקני, ללא טקסט לפני או אחרי, ללא הסברים.\n" +
    "כשאתה מבין את הבקשה:\n" +
    '{"changes":[{"employee":"שם מדויק","date":"DD/MM או ריק אם remove_all","reason":"הפנייה|חופש|גימל|לא מגיע","action":"add|remove|remove_all"}],"summary":"תיאור קצר","needs_clarification":false}\n' +
    "כשאתה צריך הבהרה:\n" +
    '{"changes":[],"summary":"","needs_clarification":true,"question":"שאלה קצרה בעברית"}';
}

function sendMsg() {
  var msg = document.getElementById("msg").value.trim();
  if (!msg) { setSt("אנא כתוב הודעה","err"); return; }
  var key = localStorage.getItem("hr_apikey") || "";
  if (!key) { setSt("אנא הכנס מפתח API למעלה ולחץ שמור","err"); return; }

  document.getElementById("sendBtn").disabled = true;
  setSt("מנתח הודעה...","loading");

  chatHistory.push({role:"user", content: msg});

  fetch("https://hr-proxy.shalevbuaron.workers.dev", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: getSystemPrompt(),
      messages: chatHistory
    })
  })
  .then(function(resp) {
    if (!resp.ok) {
      return resp.json().then(function(e) {
        throw new Error((e && e.error && e.error.message) || "שגיאת שרת " + resp.status);
      });
    }
    return resp.json();
  })
  .then(function(result) {
    if (!result || !result.content) {
      var errMsg = (result && result.error && result.error.message) || JSON.stringify(result);
      throw new Error(errMsg);
    }
    var text = result.content.filter(function(b){ return b.type === "text"; }).map(function(b){ return b.text; }).join("");
    chatHistory.push({role:"assistant", content: text});

    // Try to extract JSON
    var parsed;
    try {
      // Try direct parse first
      var clean = text.trim();
      if (clean.startsWith("```")) {
        clean = clean.replace(/```json\n?/g,"").replace(/```/g,"").trim();
      }
      parsed = JSON.parse(clean);
    } catch(e1) {
      try {
        // Try finding outermost { }
        var start = text.indexOf("{");
        var end = text.lastIndexOf("}");
        if (start === -1 || end === -1) throw new Error("no json");
        parsed = JSON.parse(text.slice(start, end+1));
      } catch(e2) {
        // Show raw response for debugging
        console.error("Raw response:", text);
        alert("תשובת המודל:\n" + text.slice(0,300));
        throw new Error("Invalid response format");
      }
    }

    if (parsed.needs_clarification) {
      // שאלת הבהרה — ממתין לתגובה
      setSt("? " + parsed.question, "");
      document.getElementById("msg").value = "";
    } else {
      var changes = parsed.changes || [];
      if (changes.length > 0) {
        changes.forEach(function(a) {
          var emp = null;
          for (var i = 0; i < EMP.length; i++) {
            if (EMP[i] === a.employee || EMP[i].includes(a.employee) || a.employee.includes(EMP[i].split(" ")[0])) {
              emp = EMP[i]; break;
            }
          }
          if (emp) {
            if (!tableData[emp]) tableData[emp] = {};
            if (a.action === "remove_all") {
              // מחיקת כל ההיעדרויות של העובד
              WD.forEach(function(d) { tableData[emp][fmt(d)] = ""; });
            } else if (a.action === "remove" && a.date) {
              tableData[emp][a.date] = "";
            } else if (a.action === "add" && a.date) {
              tableData[emp][a.date] = a.reason || "לא מגיע";
            }
          }
        });
        saveData(); render();
        setSt("✓ " + parsed.summary, "ok");
        chatHistory = []; // איפוס שיחה אחרי עדכון מוצלח
      } else {
        setSt("⚠ " + (parsed.summary || "לא הבנתי"), "err");
        chatHistory = [];
      }
      document.getElementById("msg").value = "";
    }
  })
  .catch(function(e) {
    setSt("שגיאה: " + e.message, "err");
    chatHistory = [];
  })
  .finally(function() {
    document.getElementById("sendBtn").disabled = false;
  });
}

function copyReport() {
  var tomorrow = new Date();
  tomorrow.setDate(tomorrow.getDate() + 1);
  while (tomorrow.getDay() === 5 || tomorrow.getDay() === 6) {
    tomorrow.setDate(tomorrow.getDate() + 1);
  }
  var dateKey = fmt(tomorrow);
  var dayName = DN[tomorrow.getDay()];
  var lines = "דוח נוכחות - יום " + dayName + " " + dateKey + "\n";
  lines += "---\n";
  EMP.forEach(function(e) {
    var v = (tableData[e] && tableData[e][dateKey]) || "";
    var location = "בסיס";
    if (v === "גימל") location = "גימלים";
    else if (v === "הפנייה") location = "הפנייה";
    else if (v === "חופש") location = "חופשה שנתית";
    else if (v === "לא מגיע") location = "לא מגיע";
    lines += e + " - " + location + "\n";
  });
  navigator.clipboard.writeText(lines).then(function() {
    var b = document.querySelector(".btn-copy");
    var o = b.textContent; b.textContent = "הועתק!";
    setTimeout(function(){ b.textContent = o; }, 2000);
  });
}

function copyExcel() {
  var t = "שם החייל\t" + WD.map(function(d){ return DN[d.getDay()] + " " + fmt(d); }).join("\t") + "\n";
  EMP.forEach(function(e) {
    t += e + "\t" + WD.map(function(d){ return (tableData[e] && tableData[e][fmt(d)]) || ""; }).join("\t") + "\n";
  });
  navigator.clipboard.writeText(t).then(function() {
    var b = document.querySelector(".btn-copy");
    var o = b.textContent; b.textContent = "הועתק!";
    setTimeout(function(){ b.textContent = o; }, 2000);
  });
}

window.onload = load;
</script>
</body>
</html>
